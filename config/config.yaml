# spring 项目全局配置
# 所有硬编码的固定值统一管理于此文件

# Windows 本机通达信安装路径；非 Windows 系统下忽略此节
local_paths:
  # 通达信 Vipdoc 根目录（其下分 sh/sz/.../lday/*.day）
  tdx_vipdoc: "C:\\new_zszq_cf\\Vipdoc"
  # 通达信 gbbq 股本变迁二进制文件路径
  tdx_gbbq: "C:\\new_zszq_cf\\T0002\\hq_cache\\gbbq"
  # DuckDB 数据库文件路径（~ 会展开为用户主目录）
  db: "~/data/quant.db"
  # 基础/输入数据目录（如 sync_industry 的 SwClassCode_2021.csv）；
  # 未配置或留空时回退到项目根目录下的 data/
  data_dir: ""

akshare:
  # 单只股票连续失败超过此次数时终止采集
  max_fail: 20
  # 单次行情接口请求超时时间（秒）
  request_timeout: 30
  # 融资融券等接口单次调用的异常重试次数（含首次），用于缓解 szse/sse 官网偶发 SSL 断连
  tries: 3
  # 重试间隔（秒）
  retry_delay: 3

baostock:
  # 单只股票最多重试次数
  max_fetch_attempts: 3
  # 登录会话失效后重新登录的等待时间（秒）
  retry_delay_login: 0.2
  # Broken pipe 断管后重新登录的等待时间（秒）
  retry_delay_pipe: 0.5

# 申万宏源研究 (swsresearch.com) HTTP 文件下载源
# 作为 sync_industry akshare 取数失败时的回退数据源
sws:
  # 申万行业分类（个股）历史明细 xls 下载地址
  classify_xls_url: "https://www.swsresearch.com/swindex/pdf/SwClass2021/StockClassifyUse_stock.xls"
  # 下载请求超时（秒）
  request_timeout: 30
  # 下载重试次数
  tries: 3
  # 重试间隔（秒）
  retry_delay: 3
  # 是否校验 HTTPS 证书：申万官网证书链不完整，开启校验会 CERTIFICATE_VERIFY_FAILED，
  # 故默认关闭。下载的是公开只读文件，风险较低；如所在网络可正常校验可改为 true。
  verify_ssl: false

